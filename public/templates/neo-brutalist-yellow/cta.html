<!-- Generated: neo-brutalist-yellow/cta -->
<style>
.sb-cta {
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  background: var(--sb-accent);
  position: relative;
}
.sb-cta-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-badge {
  display: inline-block;
  background: #ffffff;
  color: var(--sb-heading);
  border: 2px solid var(--sb-heading);
  border-radius: 6px;
  box-shadow: 3px 3px 0px 0px #000;
  padding: 6px 16px;
  font-weight: 800;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 24px;
}
.sb-cta h2 {
  font-size: 52px;
  font-weight: 800;
  color: var(--sb-heading);
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin: 0 0 16px 0;
}
.sb-cta .sb-lead {
  font-size: 20px;
  color: var(--sb-body);
  font-weight: 500;
  margin: 0 0 40px 0;
  line-height: 1.6;
}
.sb-cta .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: var(--sb-cta-text);
  border: 2px solid var(--sb-cta-bg);
  border-radius: var(--sb-btn-radius);
  box-shadow: 4px 4px 0px 0px #000;
  padding: 18px 56px;
  font-size: 18px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  font-family: var(--sb-font);
}
.sb-cta .sb-cta-btn:hover {
  transform: translate(4px, 4px);
  box-shadow: none;
}
.sb-cta .sb-microcopy {
  font-size: 14px;
  color: var(--sb-body);
  margin-top: 16px;
  font-weight: 500;
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta h2 { font-size: 36px; }
  .sb-cta .sb-lead { font-size: 17px; }
}
@media (max-width: 480px) {
  .sb-cta h2 { font-size: 28px; }
  .sb-cta .sb-cta-btn { padding: 16px 36px; font-size: 16px; }
}
</style>

<div class="sb-cta">
  <div class="sb-cta-inner">
    <div class="fade-up">
      <span class="sb-badge">Limited Time Offer</span>
    </div>
    <h2 class="fade-up">Ready to 3x Your<br>Conversion Rate?</h2>
    <p class="sb-lead fade-up">Join 2,400+ marketers who stopped guessing and started converting. Your first page is live in under an hour.</p>
    <div class="fade-up">
      <a href="#" class="sb-cta-btn">Start Your Free Trial Now</a>
      <p class="sb-microcopy">No credit card required &bull; Cancel anytime &bull; 30-day guarantee</p>
    </div>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

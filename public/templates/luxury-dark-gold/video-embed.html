<!-- Generated: luxury-dark-gold/video-embed -->
<style>
.sb-video-embed {
  background: #0a0a0a;
  color: var(--sb-body);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 20px 20px;
}
.sb-video-embed .sb-glow {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(167,139,113,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.sb-video-embed-inner {
  max-width: 900px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  text-align: center;
}
.sb-video-embed .sb-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--sb-accent);
  margin-bottom: 16px;
}
.sb-video-embed h2 {
  font-family: var(--sb-font);
  font-style: italic;
  font-weight: 700;
  line-height: 1.1;
  color: var(--sb-heading);
  font-size: 42px;
  margin: 0 0 16px 0;
}
.sb-video-embed .sb-subtitle {
  font-size: 17px;
  color: var(--sb-muted);
  margin-bottom: 44px;
  max-width: 520px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
}
.sb-video-embed .sb-video-wrapper {
  position: relative;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--sb-card-radius);
  overflow: hidden;
  background: rgba(255,255,255,0.02);
  box-shadow: 0 0 100px rgba(167,139,113,0.1);
}
.sb-video-embed .sb-video-ratio {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}
.sb-video-embed .sb-video-ratio iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.sb-video-embed .sb-video-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: rgba(255,255,255,0.02);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sb-video-embed .sb-video-bar .sb-vid-label {
  font-size: 12px;
  color: var(--sb-muted);
  letter-spacing: 0.05em;
}
.sb-video-embed .sb-video-bar .sb-vid-duration {
  font-size: 12px;
  color: var(--sb-accent);
  font-weight: 600;
  letter-spacing: 0.1em;
}
.sb-video-embed .sb-caption {
  margin-top: 24px;
  font-size: 14px;
  color: var(--sb-muted);
  font-style: italic;
}
.sb-video-embed .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-video-embed .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-video-embed h2 { font-size: 32px; }
}
@media (max-width: 480px) {
  .sb-video-embed h2 { font-size: 26px; }
}
</style>

<div class="sb-video-embed">
  <div class="sb-glow"></div>
  <div class="sb-video-embed-inner">
    <div class="sb-label fade-up">See It in Action</div>
    <h2 class="fade-up">A Private Walkthrough<br>of the Platform</h2>
    <p class="sb-subtitle fade-up">No sales pitch. No filler. A candid look at the interface, the workflow, and the results our clients are seeing today.</p>
    <div class="sb-video-wrapper fade-up">
      <div class="sb-video-ratio">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Platform Walkthrough" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="sb-video-bar">
        <span class="sb-vid-label">Platform Walkthrough</span>
        <span class="sb-vid-duration">5:18</span>
      </div>
    </div>
    <p class="sb-caption fade-up">No email required to view &mdash; watch at your own pace</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-video-embed .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

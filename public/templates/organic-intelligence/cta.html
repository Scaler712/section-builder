<!-- Generated: organic-intelligence/cta -->
<style>
.sb-cta {
  background: var(--sb-heading);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  color: #ffffff;
  border-radius: 5rem 5rem 0 0;
  position: relative;
  overflow: hidden;
}
.sb-cta-inner {
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-mono-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--sb-accent);
  margin-bottom: 20px;
  display: block;
}
.sb-cta .sb-section-title {
  font-family: var(--sb-font);
  font-size: clamp(36px, 6vw, 72px);
  font-weight: 700;
  font-style: italic;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: #ffffff;
  margin: 0 0 24px 0;
}
.sb-cta .sb-section-sub {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.7);
  max-width: 480px;
  margin: 0 auto 40px;
  line-height: 1.6;
}
.sb-cta .sb-cta-btn {
  display: inline-block;
  background: #ffffff;
  color: var(--sb-heading);
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 52px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: all 500ms cubic-bezier(0.22, 1, 0.36, 1);
  animation: sb-oi-cta-pulse 3s ease-in-out infinite;
}
.sb-cta .sb-cta-btn:hover {
  transform: scale(1.02);
}
@keyframes sb-oi-cta-pulse {
  0%, 100% { box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
  50% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.2); transform: scale(1.02); }
}
.sb-cta .sb-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.4);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-top: 24px;
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 1000ms cubic-bezier(0.22, 1, 0.36, 1), transform 1000ms cubic-bezier(0.22, 1, 0.36, 1);
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta { border-radius: 2.5rem 2.5rem 0 0; }
  .sb-cta .sb-section-title { font-size: 36px; }
  .sb-cta .sb-section-sub { font-size: 16px; }
}
</style>

<div class="sb-cta">
  <div class="sb-cta-inner">
    <span class="sb-mono-label fade-up">Limited Enrollment</span>
    <h2 class="sb-section-title fade-up">Your Future Self<br>Will Thank You</h2>
    <p class="sb-section-sub fade-up">Spots fill fast and we cap enrollment to maintain community quality. The next cohort starts Monday. Don't wait for the "perfect" time.</p>
    <a href="#" class="sb-cta-btn fade-up">Claim Your Spot Now</a>
    <p class="sb-note fade-up">30-day money-back guarantee. Cancel anytime.</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

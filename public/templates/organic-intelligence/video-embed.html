<!-- Generated: organic-intelligence/video-embed -->
<style>
.sb-video-embed {
  background: #fcfbf9;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-video-embed::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: -10%;
  width: 120%;
  height: 120px;
  background: var(--sb-highlight);
  border-radius: 50%;
  pointer-events: none;
}
.sb-video-embed-inner {
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-video-embed .sb-mono-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--sb-accent);
  margin-bottom: 20px;
  display: block;
}
.sb-video-embed .sb-section-title {
  font-family: var(--sb-font);
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700;
  font-style: italic;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--sb-heading);
  margin: 0 0 16px 0;
}
.sb-video-embed .sb-section-sub {
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--sb-body);
  max-width: 480px;
  margin: 0 auto 48px;
  line-height: 1.6;
}
.sb-video-embed .sb-video-wrapper {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  border: 1px solid #e5e5e5;
  border-radius: var(--sb-card-radius);
  overflow: hidden;
}
.sb-video-embed .sb-video-ratio {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}
.sb-video-embed .sb-video-ratio iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.sb-video-embed .sb-video-caption {
  margin-top: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--sb-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
.sb-video-embed .fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 1000ms cubic-bezier(0.22, 1, 0.36, 1), transform 1000ms cubic-bezier(0.22, 1, 0.36, 1);
}
.sb-video-embed .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-video-embed .sb-section-title { font-size: 32px; }
  .sb-video-embed .sb-section-sub { font-size: 15px; }
}
</style>

<div class="sb-video-embed">
  <div class="sb-video-embed-inner">
    <span class="sb-mono-label fade-up">Watch</span>
    <h2 class="sb-section-title fade-up">See the System<br>In Action</h2>
    <p class="sb-section-sub fade-up">Under 8 minutes. The exact framework that took 3,200 founders from idea to revenue.</p>
    <div class="sb-video-wrapper fade-up">
      <div class="sb-video-ratio">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="System walkthrough" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
    <p class="sb-video-caption fade-up">No opt-in required. Full breakdown, free.</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-video-embed .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

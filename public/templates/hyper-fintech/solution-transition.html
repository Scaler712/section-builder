<!-- Generated: hyper-fintech/solution-transition -->
<style>
.sb-solution-transition {
  background: var(--sb-accent);
  color: #000000;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  border-radius: 100px;
  margin: 0 20px;
  position: relative;
  overflow: hidden;
}
.sb-solution-transition-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-solution-transition .sb-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: rgba(0,0,0,0.5);
  margin-bottom: 24px;
  display: inline-block;
}
.sb-solution-transition h2 {
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.04em;
  color: #000000;
  margin: 0 0 24px 0;
}
.sb-solution-transition .sb-desc {
  font-size: 18px;
  color: rgba(0,0,0,0.7);
  line-height: 1.7;
  max-width: 600px;
  margin: 0 auto 40px;
}
.sb-solution-transition .sb-cta-btn {
  display: inline-block;
  background: #000000;
  color: var(--sb-accent);
  border: none;
  border-radius: 9999px;
  padding: 18px 48px;
  font-family: var(--sb-font);
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
}
.sb-solution-transition .sb-cta-btn:hover {
  transform: scale(1.04);
}
.sb-solution-transition .sb-cta-btn:active {
  transform: scale(0.95);
}
.sb-solution-transition .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s cubic-bezier(0.22,1,0.36,1), transform 0.6s cubic-bezier(0.22,1,0.36,1);
}
.sb-solution-transition .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-solution-transition { border-radius: 48px; margin: 0 12px; }
  .sb-solution-transition h2 { font-size: 30px; }
  .sb-solution-transition .sb-desc { font-size: 16px; }
}
</style>

<div class="sb-solution-transition">
  <div class="sb-solution-transition-inner">
    <span class="sb-badge fade-up">The Shift</span>
    <h2 class="fade-up">There's a faster way to move money.</h2>
    <p class="sb-desc fade-up">We rebuilt payment infrastructure from the ground up. No legacy code, no banking middleware, no compromises. Just pure speed, total transparency, and rails designed for the next decade of commerce.</p>
    <a href="#" class="sb-cta-btn fade-up">See How It Works</a>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-solution-transition .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

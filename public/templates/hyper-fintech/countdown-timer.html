<!-- Generated: hyper-fintech/countdown-timer -->
<style>
.sb-countdown-timer {
  background: #0A0A0A;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
}
.sb-countdown-timer-wrap {
  max-width: 1100px;
  margin: 0 auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 28px;
  padding: 64px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.sb-countdown-timer-wrap::before {
  content: '';
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(circle, rgba(253,224,71,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.sb-countdown-timer .sb-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--sb-accent);
  margin-bottom: 16px;
  display: inline-block;
  position: relative;
}
.sb-countdown-timer h2 {
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.04em;
  color: var(--sb-heading);
  margin: 0 0 12px 0;
  position: relative;
}
.sb-countdown-timer .sb-desc {
  font-size: 16px;
  color: var(--sb-muted);
  margin: 0 0 40px 0;
  position: relative;
}
.sb-countdown-timer .sb-timer {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 40px;
  position: relative;
}
.sb-countdown-timer .sb-timer-block {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 24px 20px;
  min-width: 90px;
}
.sb-countdown-timer .sb-timer-value {
  font-size: 40px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1;
  display: block;
  letter-spacing: -0.04em;
}
.sb-countdown-timer .sb-timer-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--sb-muted);
  display: block;
  margin-top: 8px;
}
.sb-countdown-timer .sb-timer-sep {
  font-size: 32px;
  color: var(--sb-accent);
  align-self: center;
  font-weight: 700;
  padding-bottom: 16px;
}
.sb-countdown-timer .sb-progress-wrap {
  max-width: 400px;
  margin: 0 auto 32px;
  position: relative;
}
.sb-countdown-timer .sb-progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.sb-countdown-timer .sb-progress-fill {
  height: 100%;
  background: var(--sb-accent);
  border-radius: 2px;
  width: 72%;
  transition: width 0.6s ease;
}
.sb-countdown-timer .sb-progress-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--sb-accent);
  margin-top: 8px;
  display: block;
}
.sb-countdown-timer .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: var(--sb-cta-text, #000000);
  border: none;
  border-radius: 9999px;
  padding: 18px 48px;
  font-family: var(--sb-font);
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
  position: relative;
}
.sb-countdown-timer .sb-cta-btn:hover {
  transform: scale(1.04);
}
.sb-countdown-timer .sb-cta-btn:active {
  transform: scale(0.95);
}
.sb-countdown-timer .sb-note {
  font-size: 13px;
  color: var(--sb-muted);
  margin-top: 16px;
  position: relative;
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s cubic-bezier(0.22,1,0.36,1), transform 0.6s cubic-bezier(0.22,1,0.36,1);
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer-wrap { padding: 40px 20px; border-radius: 20px; }
  .sb-countdown-timer h2 { font-size: 28px; }
  .sb-countdown-timer .sb-timer { gap: 8px; }
  .sb-countdown-timer .sb-timer-block { min-width: 64px; padding: 16px 12px; border-radius: 14px; }
  .sb-countdown-timer .sb-timer-value { font-size: 28px; }
  .sb-countdown-timer .sb-timer-sep { font-size: 24px; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-countdown-timer-wrap">
    <span class="sb-badge fade-up">Limited Time</span>
    <h2 class="fade-up">Early access pricing ends soon.</h2>
    <p class="sb-desc fade-up">Lock in 40% off before rates go back to normal. 127 spots remaining.</p>
    <div class="sb-timer fade-up">
      <div class="sb-timer-block">
        <span class="sb-timer-value" id="sb-hf-cd-days">02</span>
        <span class="sb-timer-label">Days</span>
      </div>
      <div class="sb-timer-sep">:</div>
      <div class="sb-timer-block">
        <span class="sb-timer-value" id="sb-hf-cd-hours">14</span>
        <span class="sb-timer-label">Hours</span>
      </div>
      <div class="sb-timer-sep">:</div>
      <div class="sb-timer-block">
        <span class="sb-timer-value" id="sb-hf-cd-mins">37</span>
        <span class="sb-timer-label">Minutes</span>
      </div>
      <div class="sb-timer-sep">:</div>
      <div class="sb-timer-block">
        <span class="sb-timer-value" id="sb-hf-cd-secs">00</span>
        <span class="sb-timer-label">Seconds</span>
      </div>
    </div>
    <div class="sb-progress-wrap fade-up">
      <div class="sb-progress-bar">
        <div class="sb-progress-fill"></div>
      </div>
      <span class="sb-progress-label">72% of spots claimed</span>
    </div>
    <a href="#" class="sb-cta-btn fade-up">Claim Your Spot</a>
    <p class="sb-note fade-up">No credit card required. Cancel anytime.</p>
  </div>
</div>

<script>
(function() {
  var deadline = new Date();
  deadline.setDate(deadline.getDate() + 2);
  deadline.setHours(deadline.getHours() + 14);
  deadline.setMinutes(deadline.getMinutes() + 37);

  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function tick() {
    var diff = Math.max(0, deadline.getTime() - Date.now());
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    var de = document.getElementById('sb-hf-cd-days');
    var he = document.getElementById('sb-hf-cd-hours');
    var me = document.getElementById('sb-hf-cd-mins');
    var se = document.getElementById('sb-hf-cd-secs');
    if (de) de.textContent = pad(d);
    if (he) he.textContent = pad(h);
    if (me) me.textContent = pad(m);
    if (se) se.textContent = pad(s);
    if (diff > 0) setTimeout(tick, 1000);
  }
  tick();

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

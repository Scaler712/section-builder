<!-- Generated: hyper-fintech/cta -->
<style>
.sb-cta {
  background: #0A0A0A;
  padding: 0 20px;
  font-family: var(--sb-font);
}
.sb-cta-wrap {
  background: var(--sb-accent);
  color: #000000;
  border-radius: 100px;
  padding: 80px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.sb-cta-wrap::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: rgba(0,0,0,0.05);
  border-radius: 9999px;
  pointer-events: none;
}
.sb-cta-inner {
  max-width: 700px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: rgba(0,0,0,0.5);
  margin-bottom: 24px;
  display: inline-block;
}
.sb-cta h2 {
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.04em;
  color: #000000;
  margin: 0 0 24px 0;
}
.sb-cta .sb-desc {
  font-size: 18px;
  color: rgba(0,0,0,0.6);
  line-height: 1.6;
  margin: 0 0 40px 0;
}
.sb-cta .sb-cta-btn {
  display: inline-block;
  background: #000000;
  color: var(--sb-accent);
  border: none;
  border-radius: 9999px;
  padding: 18px 48px;
  font-family: var(--sb-font);
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
}
.sb-cta .sb-cta-btn:hover {
  transform: scale(1.04);
}
.sb-cta .sb-cta-btn:active {
  transform: scale(0.95);
}
.sb-cta .sb-note {
  margin-top: 20px;
  font-size: 13px;
  color: rgba(0,0,0,0.4);
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s cubic-bezier(0.22,1,0.36,1), transform 0.6s cubic-bezier(0.22,1,0.36,1);
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta-wrap { border-radius: 48px; padding: 56px 24px; }
  .sb-cta h2 { font-size: 30px; }
  .sb-cta .sb-desc { font-size: 16px; }
}
</style>

<div class="sb-cta">
  <div class="sb-cta-wrap">
    <div class="sb-cta-inner">
      <span class="sb-badge fade-up">Limited Spots</span>
      <h2 class="fade-up">Stop leaving money on the table.</h2>
      <p class="sb-desc fade-up">Join 3,200+ companies that moved to next-gen payment rails. Your first $50K in transactions is on us.</p>
      <a href="#" class="sb-cta-btn fade-up">Claim Your Free Trial</a>
      <p class="sb-note fade-up">No credit card required. Go live in under 48 hours.</p>
    </div>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

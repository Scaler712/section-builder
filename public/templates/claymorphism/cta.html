<!-- Generated: claymorphism/cta -->
<style>
.sb-cta {
  background: var(--sb-highlight);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-cta .sb-blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.12;
  filter: blur(80px);
  animation: clayFloat 8s ease-in-out infinite;
  pointer-events: none;
}
.sb-cta .sb-blob-1 {
  width: 420px;
  height: 420px;
  background: var(--sb-accent);
  top: -100px;
  left: -80px;
}
.sb-cta .sb-blob-2 {
  width: 340px;
  height: 340px;
  background: #DB2777;
  bottom: -80px;
  right: -60px;
  animation-delay: -3s;
}
.sb-cta .sb-blob-3 {
  width: 240px;
  height: 240px;
  background: #0EA5E9;
  top: 30%;
  right: 10%;
  animation-delay: -6s;
}
@keyframes clayFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(2deg); }
}
.sb-cta-inner {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-card {
  background: #ffffff;
  border-radius: 32px;
  box-shadow: 0 2px 4px rgba(124,58,237,0.04), 0 8px 16px rgba(124,58,237,0.06), 0 16px 32px rgba(124,58,237,0.08), 0 32px 64px rgba(124,58,237,0.1), inset 0 -2px 4px rgba(0,0,0,0.02);
  padding: 64px 48px;
}
.sb-cta .sb-badge {
  display: inline-block;
  background: rgba(219,39,119,0.1);
  color: #DB2777;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 24px;
}
.sb-cta h2 {
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 900;
  line-height: 1.1;
  color: var(--sb-heading);
  margin: 0 0 16px 0;
}
.sb-cta .sb-sub {
  font-size: 17px;
  color: var(--sb-body);
  max-width: 500px;
  margin: 0 auto 36px;
  line-height: 1.7;
}
.sb-cta .sb-cta-btn {
  display: inline-block;
  background: linear-gradient(135deg, #A78BFA, #7C3AED);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 20px 52px;
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: 18px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(124,58,237,0.3);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.sb-cta .sb-cta-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(124,58,237,0.4);
}
.sb-cta .sb-cta-btn:active {
  transform: scale(0.92);
}
.sb-cta .sb-micro {
  margin-top: 20px;
  font-size: 14px;
  color: var(--sb-muted);
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta .sb-card { padding: 40px 24px; border-radius: 24px; }
  .sb-cta h2 { font-size: 28px; }
  .sb-cta .sb-cta-btn { padding: 18px 40px; font-size: 16px; }
}
</style>

<div class="sb-cta">
  <div class="sb-blob sb-blob-1"></div>
  <div class="sb-blob sb-blob-2"></div>
  <div class="sb-blob sb-blob-3"></div>
  <div class="sb-cta-inner">
    <div class="sb-card fade-up">
      <span class="sb-badge">Only 23 Spots Left</span>
      <h2>Stop Planning. Start Building.</h2>
      <p class="sb-sub">Join 2,400+ founders who went from zero to revenue in under 30 days. The next cohort starts Monday — and this price won't last.</p>
      <a href="#" class="sb-cta-btn">Claim Your Spot Now</a>
      <p class="sb-micro">30-day money-back guarantee. Cancel anytime.</p>
    </div>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

<!-- Generated: claymorphism/video-embed -->
<style>
.sb-video-embed {
  background: var(--sb-highlight);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-video-embed .sb-blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.1;
  filter: blur(80px);
  animation: clayFloat 8s ease-in-out infinite;
  pointer-events: none;
}
.sb-video-embed .sb-blob-1 {
  width: 360px;
  height: 360px;
  background: var(--sb-accent);
  top: -80px;
  left: -60px;
}
.sb-video-embed .sb-blob-2 {
  width: 280px;
  height: 280px;
  background: #0EA5E9;
  bottom: -60px;
  right: -80px;
  animation-delay: -4s;
}
@keyframes clayFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(2deg); }
}
.sb-video-embed-inner {
  max-width: 860px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-video-embed .sb-badge {
  display: inline-block;
  background: rgba(124,58,237,0.1);
  color: var(--sb-accent);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.sb-video-embed .sb-section-title {
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 900;
  line-height: 1.1;
  color: var(--sb-heading);
  margin: 0 0 12px 0;
}
.sb-video-embed .sb-section-sub {
  font-size: 17px;
  color: var(--sb-body);
  max-width: 520px;
  margin: 0 auto 36px;
  line-height: 1.6;
}
.sb-video-embed .sb-video-card {
  background: #ffffff;
  border-radius: 28px;
  box-shadow: 0 2px 4px rgba(124,58,237,0.04), 0 8px 16px rgba(124,58,237,0.06), 0 16px 32px rgba(124,58,237,0.08), 0 32px 64px rgba(124,58,237,0.1), inset 0 -2px 4px rgba(0,0,0,0.02);
  padding: 16px;
  transition: transform 0.3s ease;
}
.sb-video-embed .sb-video-card:hover {
  transform: translateY(-4px);
}
.sb-video-embed .sb-video-wrapper {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(124,58,237,0.06), rgba(219,39,119,0.06));
}
.sb-video-embed .sb-video-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 20px;
}
.sb-video-embed .sb-caption {
  margin-top: 20px;
  font-size: 14px;
  color: var(--sb-muted);
}
.sb-video-embed .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-video-embed .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-video-embed .sb-section-title { font-size: 28px; }
  .sb-video-embed .sb-video-card { padding: 10px; border-radius: 22px; }
  .sb-video-embed .sb-video-wrapper { border-radius: 16px; }
}
</style>

<div class="sb-video-embed">
  <div class="sb-blob sb-blob-1"></div>
  <div class="sb-blob sb-blob-2"></div>
  <div class="sb-video-embed-inner">
    <span class="sb-badge fade-up">See It in Action</span>
    <h2 class="sb-section-title fade-up">Watch How It Works</h2>
    <p class="sb-section-sub fade-up">In this 3-minute walkthrough, you'll see exactly how our members go from signup to first client in under 30 days.</p>
    <div class="sb-video-card fade-up">
      <div class="sb-video-wrapper">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Product walkthrough" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
    <p class="sb-caption fade-up">3 min watch — no email required</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-video-embed .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

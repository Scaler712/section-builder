<!-- Generated: claymorphism/countdown-timer -->
<style>
.sb-countdown-timer {
  background: var(--sb-highlight);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-countdown-timer .sb-blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.12;
  filter: blur(80px);
  animation: clayFloat 8s ease-in-out infinite;
  pointer-events: none;
}
.sb-countdown-timer .sb-blob-1 {
  width: 380px;
  height: 380px;
  background: #DB2777;
  top: -80px;
  right: -60px;
}
.sb-countdown-timer .sb-blob-2 {
  width: 300px;
  height: 300px;
  background: var(--sb-accent);
  bottom: -60px;
  left: -80px;
  animation-delay: -4s;
}
@keyframes clayFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(2deg); }
}
.sb-countdown-timer-inner {
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-countdown-timer .sb-badge {
  display: inline-block;
  background: rgba(219,39,119,0.1);
  color: #DB2777;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 24px;
}
.sb-countdown-timer .sb-section-title {
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 900;
  line-height: 1.1;
  color: var(--sb-heading);
  margin: 0 0 36px 0;
}
.sb-countdown-timer .sb-timer-boxes {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-bottom: 40px;
}
.sb-countdown-timer .sb-timer-box {
  background: #ffffff;
  border-radius: 24px;
  box-shadow: 0 2px 4px rgba(124,58,237,0.04), 0 8px 16px rgba(124,58,237,0.06), 0 16px 32px rgba(124,58,237,0.08), inset 0 -2px 4px rgba(0,0,0,0.02);
  padding: 24px 28px;
  min-width: 100px;
  transition: transform 0.3s ease;
}
.sb-countdown-timer .sb-timer-box:hover {
  transform: translateY(-3px);
}
.sb-countdown-timer .sb-timer-number {
  display: block;
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: 44px;
  font-weight: 900;
  color: var(--sb-accent);
  line-height: 1;
}
.sb-countdown-timer .sb-timer-label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--sb-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 8px;
}
.sb-countdown-timer .sb-section-sub {
  font-size: 17px;
  color: var(--sb-body);
  max-width: 480px;
  margin: 0 auto 32px;
  line-height: 1.6;
}
.sb-countdown-timer .sb-cta-btn {
  display: inline-block;
  background: linear-gradient(135deg, #F472B6, #DB2777);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 48px;
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: 17px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(219,39,119,0.3);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.sb-countdown-timer .sb-cta-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(219,39,119,0.35);
}
.sb-countdown-timer .sb-cta-btn:active {
  transform: scale(0.92);
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer .sb-section-title { font-size: 28px; }
  .sb-countdown-timer .sb-timer-boxes { gap: 10px; }
  .sb-countdown-timer .sb-timer-box { min-width: 72px; padding: 18px 14px; border-radius: 20px; }
  .sb-countdown-timer .sb-timer-number { font-size: 32px; }
  .sb-countdown-timer .sb-cta-btn { padding: 16px 36px; font-size: 15px; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-blob sb-blob-1"></div>
  <div class="sb-blob sb-blob-2"></div>
  <div class="sb-countdown-timer-inner">
    <span class="sb-badge fade-up">Offer Expires Soon</span>
    <h2 class="sb-section-title fade-up">This Price Disappears When the Timer Hits Zero</h2>
    <div class="sb-timer-boxes fade-up">
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-cd-days">02</span>
        <span class="sb-timer-label">Days</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-cd-hours">11</span>
        <span class="sb-timer-label">Hours</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-cd-mins">47</span>
        <span class="sb-timer-label">Minutes</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-cd-secs">33</span>
        <span class="sb-timer-label">Seconds</span>
      </div>
    </div>
    <p class="sb-section-sub fade-up">Lock in the launch price before it increases by 40%. This offer is only available to the first 100 members.</p>
    <a href="#" class="sb-cta-btn fade-up">Lock In My Price</a>
  </div>
</div>

<script>
(function() {
  var container = document.querySelector('.sb-countdown-timer');
  var deadline = container.getAttribute('data-deadline');
  var target = deadline ? new Date(deadline).getTime() : Date.now() + 3 * 24 * 60 * 60 * 1000;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function tick() {
    var now = Date.now();
    var diff = Math.max(0, target - now);
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    var elD = document.getElementById('sb-cd-days');
    var elH = document.getElementById('sb-cd-hours');
    var elM = document.getElementById('sb-cd-mins');
    var elS = document.getElementById('sb-cd-secs');
    if (elD) elD.textContent = pad(d);
    if (elH) elH.textContent = pad(h);
    if (elM) elM.textContent = pad(m);
    if (elS) elS.textContent = pad(s);
    if (diff > 0) requestAnimationFrame(tick);
  }
  tick();

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

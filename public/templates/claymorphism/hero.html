<!-- Generated: claymorphism/hero -->
<style>
.sb-hero {
  background: var(--sb-highlight);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  min-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.sb-hero .sb-blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.1;
  filter: blur(80px);
  animation: clayFloat 8s ease-in-out infinite;
  pointer-events: none;
}
.sb-hero .sb-blob-1 {
  width: 420px;
  height: 420px;
  background: var(--sb-accent);
  top: -80px;
  right: -60px;
}
.sb-hero .sb-blob-2 {
  width: 340px;
  height: 340px;
  background: #DB2777;
  bottom: -60px;
  left: -40px;
  animation-delay: -3s;
}
.sb-hero .sb-blob-3 {
  width: 260px;
  height: 260px;
  background: #0EA5E9;
  top: 40%;
  left: 60%;
  animation-delay: -5s;
}
@keyframes clayFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(2deg); }
}
.sb-hero-inner {
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-hero .sb-badge {
  display: inline-block;
  background: rgba(124,58,237,0.1);
  color: var(--sb-accent);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 28px;
}
.sb-hero h1 {
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: clamp(40px, 6vw, 72px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--sb-heading);
  margin: 0 0 24px 0;
}
.sb-hero h1 .sb-accent-word {
  color: var(--sb-accent);
}
.sb-hero .sb-sub {
  font-size: 18px;
  color: var(--sb-body);
  max-width: 560px;
  margin: 0 auto 40px;
  line-height: 1.7;
}
.sb-hero .sb-cta-btn {
  display: inline-block;
  background: linear-gradient(135deg, #A78BFA, #7C3AED);
  color: var(--sb-cta-text, #ffffff);
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 44px;
  font-family: 'Nunito', var(--sb-font), sans-serif;
  font-size: 17px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(124,58,237,0.3);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.sb-hero .sb-cta-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(124,58,237,0.35);
}
.sb-hero .sb-cta-btn:active {
  transform: scale(0.92);
}
.sb-hero .sb-trust {
  margin-top: 40px;
  color: var(--sb-muted);
  font-size: 14px;
}
.sb-hero .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-hero .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-hero { min-height: 70vh; }
  .sb-hero h1 { font-size: 36px; }
  .sb-hero .sb-sub { font-size: 16px; margin-bottom: 32px; }
  .sb-hero .sb-blob-1 { width: 260px; height: 260px; }
  .sb-hero .sb-blob-2 { width: 200px; height: 200px; }
  .sb-hero .sb-blob-3 { width: 160px; height: 160px; }
}
</style>

<div class="sb-hero">
  <div class="sb-blob sb-blob-1"></div>
  <div class="sb-blob sb-blob-2"></div>
  <div class="sb-blob sb-blob-3"></div>
  <div class="sb-hero-inner">
    <span class="sb-badge fade-up">Limited Spots Available</span>
    <h1 class="fade-up">Launch Your Business<br>in <span class="sb-accent-word">30 Days</span></h1>
    <p class="sb-sub fade-up">The proven system that took 2,400+ entrepreneurs from idea to revenue. No guesswork, no fluff — just a clear path to your first paying customers.</p>
    <a href="#" class="sb-cta-btn fade-up">Get Instant Access</a>
    <p class="sb-trust fade-up">Trusted by 2,400+ founders across 38 countries</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-hero .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

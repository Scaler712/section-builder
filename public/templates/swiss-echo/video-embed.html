<!-- Generated: swiss-echo/video-embed -->
<style>
.sb-video-embed {
  background: var(--sb-highlight);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
}
.sb-video-embed-inner {
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
}
.sb-video-embed .sb-label {
  color: var(--sb-muted);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: block;
}
.sb-video-embed .sb-section-title {
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 700;
  line-height: 0.9;
  letter-spacing: -0.05em;
  color: var(--sb-heading);
  margin: 0 0 12px 0;
}
.sb-video-embed .sb-echo {
  display: block;
  color: transparent;
  -webkit-text-stroke: 1px rgba(30,30,30,0.15);
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 700;
  line-height: 0.9;
  letter-spacing: -0.05em;
  margin-top: -0.1em;
  margin-bottom: 20px;
  user-select: none;
}
.sb-video-embed .sb-section-sub {
  font-size: 17px;
  font-weight: 500;
  color: var(--sb-body);
  max-width: 480px;
  margin: 0 auto 48px;
  line-height: 1.7;
}
.sb-video-embed .sb-video-wrapper {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  border: 1px solid rgba(30,30,30,0.1);
  overflow: hidden;
}
.sb-video-embed .sb-video-ratio {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}
.sb-video-embed .sb-video-ratio iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.sb-video-embed .sb-video-caption {
  margin-top: 24px;
  font-size: 13px;
  font-weight: 500;
  color: var(--sb-muted);
  letter-spacing: 0.04em;
}
.sb-video-embed .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 700ms cubic-bezier(0.77, 0, 0.175, 1), transform 700ms cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-video-embed .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-video-embed .sb-section-title { font-size: 36px; }
  .sb-video-embed .sb-echo { font-size: 36px; }
  .sb-video-embed .sb-section-sub { font-size: 15px; }
}
</style>

<div class="sb-video-embed">
  <div class="sb-video-embed-inner">
    <span class="sb-label fade-up">Watch</span>
    <h2 class="sb-section-title fade-up">See the<br>System</h2>
    <span class="sb-echo fade-up" aria-hidden="true">System</span>
    <p class="sb-section-sub fade-up">Under 8 minutes. The exact framework that took 2,400 founders from idea to revenue.</p>
    <div class="sb-video-wrapper fade-up">
      <div class="sb-video-ratio">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="System walkthrough" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
    <p class="sb-video-caption fade-up">No opt-in required. Full breakdown, free.</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-video-embed .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

<!-- Generated: swiss-echo/countdown-timer -->
<style>
.sb-countdown-timer {
  background: var(--sb-highlight);
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
}
.sb-countdown-timer-inner {
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
}
.sb-countdown-timer .sb-label {
  color: var(--sb-muted);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: block;
}
.sb-countdown-timer .sb-section-title {
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 700;
  line-height: 0.9;
  letter-spacing: -0.05em;
  color: var(--sb-heading);
  margin: 0 0 48px 0;
}
.sb-countdown-timer .sb-timer-boxes {
  display: flex;
  justify-content: center;
  gap: 1px;
  background: rgba(30,30,30,0.1);
  margin-bottom: 48px;
}
.sb-countdown-timer .sb-timer-box {
  background: var(--sb-highlight);
  padding: 32px 40px;
  min-width: 100px;
  transition: all 700ms cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-countdown-timer .sb-timer-box:hover {
  background: #ffffff;
}
.sb-countdown-timer .sb-timer-number {
  display: block;
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 700;
  color: var(--sb-heading);
  letter-spacing: -0.05em;
  line-height: 0.9;
}
.sb-countdown-timer .sb-timer-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--sb-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-top: 12px;
}
.sb-countdown-timer .sb-section-sub {
  font-size: 17px;
  font-weight: 500;
  color: var(--sb-body);
  max-width: 440px;
  margin: 0 auto 40px;
  line-height: 1.7;
}
.sb-countdown-timer .sb-cta-btn {
  display: inline-block;
  background: transparent;
  color: var(--sb-cta-bg);
  border: 1px solid var(--sb-cta-bg);
  border-radius: var(--sb-btn-radius);
  padding: 16px 52px;
  font-family: var(--sb-font);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: all 700ms cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-countdown-timer .sb-cta-btn:hover {
  background: var(--sb-cta-bg);
  color: var(--sb-highlight);
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 700ms cubic-bezier(0.77, 0, 0.175, 1), transform 700ms cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer .sb-section-title { font-size: 36px; }
  .sb-countdown-timer .sb-timer-boxes { flex-wrap: wrap; }
  .sb-countdown-timer .sb-timer-box { min-width: 70px; padding: 20px 24px; flex: 1; }
  .sb-countdown-timer .sb-timer-number { font-size: 36px; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-countdown-timer-inner">
    <span class="sb-label fade-up">Time Sensitive</span>
    <h2 class="sb-section-title fade-up">This Price<br>Expires</h2>
    <div class="sb-timer-boxes fade-up">
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-se-cd-days">02</span>
        <span class="sb-timer-label">Days</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-se-cd-hours">11</span>
        <span class="sb-timer-label">Hours</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-se-cd-mins">47</span>
        <span class="sb-timer-label">Min</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-se-cd-secs">33</span>
        <span class="sb-timer-label">Sec</span>
      </div>
    </div>
    <p class="sb-section-sub fade-up">Lock in the launch price before it increases by 40%. Limited to the first 100 members only.</p>
    <a href="#" class="sb-cta-btn fade-up">Lock In My Price</a>
  </div>
</div>

<script>
(function() {
  var container = document.querySelector('.sb-countdown-timer');
  var deadline = container.getAttribute('data-deadline');
  var target = deadline ? new Date(deadline).getTime() : Date.now() + 3 * 24 * 60 * 60 * 1000;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function tick() {
    var now = Date.now();
    var diff = Math.max(0, target - now);
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    var elD = document.getElementById('sb-se-cd-days');
    var elH = document.getElementById('sb-se-cd-hours');
    var elM = document.getElementById('sb-se-cd-mins');
    var elS = document.getElementById('sb-se-cd-secs');
    if (elD) elD.textContent = pad(d);
    if (elH) elH.textContent = pad(h);
    if (elM) elM.textContent = pad(m);
    if (elS) elS.textContent = pad(s);
    if (diff > 0) requestAnimationFrame(tick);
  }
  tick();

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

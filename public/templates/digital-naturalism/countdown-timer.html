<!-- Generated: digital-naturalism/countdown-timer -->
<style>
.sb-countdown-timer {
  background: #0C0A09;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-countdown-timer::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  mix-blend-mode: overlay;
  pointer-events: none;
}
.sb-countdown-timer .sb-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(212,242,104,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.sb-countdown-timer-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-countdown-timer .sb-label {
  color: var(--sb-accent);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 24px;
  display: block;
  font-family: sans-serif;
}
.sb-countdown-timer h2 {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 300;
  font-style: italic;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--sb-heading);
  margin: 0 0 12px 0;
}
.sb-countdown-timer h2 strong {
  font-weight: 700;
  font-style: normal;
  color: var(--sb-accent);
}
.sb-countdown-timer .sb-sub {
  font-size: 17px;
  color: var(--sb-muted);
  margin: 0 0 44px 0;
  font-family: sans-serif;
}
.sb-countdown-timer .sb-timer {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 44px;
}
.sb-countdown-timer .sb-timer-box {
  background: #292524;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--sb-card-radius);
  padding: 24px 28px;
  min-width: 100px;
  transition: border-color 300ms cubic-bezier(0.4,0,0.2,1);
}
.sb-countdown-timer .sb-timer-box:hover {
  border-color: rgba(212,242,104,0.2);
}
.sb-countdown-timer .sb-timer-num {
  font-size: 44px;
  font-weight: 300;
  color: var(--sb-accent);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.sb-countdown-timer .sb-timer-num strong {
  font-weight: 700;
}
.sb-countdown-timer .sb-timer-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--sb-muted);
  margin-top: 8px;
  font-family: sans-serif;
}
.sb-countdown-timer .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: var(--sb-cta-text);
  border-radius: var(--sb-btn-radius);
  padding: 18px 52px;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  font-family: sans-serif;
  transition: all 300ms cubic-bezier(0.4,0,0.2,1);
}
.sb-countdown-timer .sb-cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 36px rgba(212,242,104,0.25);
}
.sb-countdown-timer .sb-note {
  font-size: 14px;
  color: var(--sb-muted);
  margin-top: 16px;
  font-family: sans-serif;
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer h2 { font-size: 28px; }
  .sb-countdown-timer .sb-timer { gap: 10px; }
  .sb-countdown-timer .sb-timer-box { min-width: 70px; padding: 18px 16px; }
  .sb-countdown-timer .sb-timer-num { font-size: 32px; }
  .sb-countdown-timer .sb-cta-btn { padding: 16px 36px; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-glow"></div>
  <div class="sb-countdown-timer-inner">
    <span class="sb-label fade-up">Limited Time</span>
    <h2 class="fade-up">This offer expires <strong>soon</strong></h2>
    <p class="sb-sub fade-up">Lock in the launch price before it goes up permanently.</p>
    <div class="sb-timer fade-up">
      <div class="sb-timer-box">
        <div class="sb-timer-num" id="sb-days"><strong>02</strong></div>
        <div class="sb-timer-label">Days</div>
      </div>
      <div class="sb-timer-box">
        <div class="sb-timer-num" id="sb-hours"><strong>11</strong></div>
        <div class="sb-timer-label">Hours</div>
      </div>
      <div class="sb-timer-box">
        <div class="sb-timer-num" id="sb-mins"><strong>47</strong></div>
        <div class="sb-timer-label">Minutes</div>
      </div>
      <div class="sb-timer-box">
        <div class="sb-timer-num" id="sb-secs"><strong>33</strong></div>
        <div class="sb-timer-label">Seconds</div>
      </div>
    </div>
    <div class="fade-up">
      <a href="#" class="sb-cta-btn">Claim Your Spot</a>
      <p class="sb-note">Price increases to $149 when the timer hits zero</p>
    </div>
  </div>
</div>

<script>
(function() {
  var deadline = new Date().getTime() + (2 * 24 * 60 * 60 * 1000) + (11 * 60 * 60 * 1000) + (47 * 60 * 1000) + (33 * 1000);
  var timer = setInterval(function() {
    var now = new Date().getTime();
    var diff = deadline - now;
    if (diff <= 0) {
      clearInterval(timer);
      diff = 0;
    }
    var d = Math.floor(diff / (1000 * 60 * 60 * 24));
    var h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    var s = Math.floor((diff % (1000 * 60)) / 1000);
    var dEl = document.getElementById('sb-days');
    var hEl = document.getElementById('sb-hours');
    var mEl = document.getElementById('sb-mins');
    var sEl = document.getElementById('sb-secs');
    if (dEl) dEl.innerHTML = '<strong>' + (d < 10 ? '0' + d : d) + '</strong>';
    if (hEl) hEl.innerHTML = '<strong>' + (h < 10 ? '0' + h : h) + '</strong>';
    if (mEl) mEl.innerHTML = '<strong>' + (m < 10 ? '0' + m : m) + '</strong>';
    if (sEl) sEl.innerHTML = '<strong>' + (s < 10 ? '0' + s : s) + '</strong>';
  }, 1000);
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

<!-- Generated: brutalist-anton/cta -->
<style>
.sb-cta {
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  background: var(--sb-accent);
  position: relative;
  overflow: hidden;
}
.sb-cta-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-badge {
  display: inline-block;
  background: var(--sb-heading);
  color: #ffffff;
  padding: 4px 14px;
  transform: rotate(-2deg);
  font-weight: 700;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.08em;
  margin-bottom: 28px;
}
.sb-cta h2 {
  font-size: 64px;
  font-weight: 800;
  color: var(--sb-heading);
  text-transform: uppercase;
  line-height: 0.9;
  margin: 0 0 20px 0;
}
.sb-cta .sb-lead {
  font-size: 18px;
  color: var(--sb-body);
  font-weight: 500;
  margin: 0 0 40px 0;
  line-height: 1.6;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
}
.sb-cta .sb-cta-btn {
  display: inline-block;
  background: var(--sb-heading);
  color: #ffffff;
  border: 2px solid var(--sb-heading);
  border-radius: var(--sb-btn-radius);
  box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.3);
  padding: 18px 56px;
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  text-decoration: none;
  cursor: pointer;
  transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
  font-family: var(--sb-font);
}
.sb-cta .sb-cta-btn:hover {
  transform: translate(4px, 4px);
  box-shadow: none;
}
.sb-cta .sb-microcopy {
  font-size: 14px;
  color: var(--sb-body);
  margin-top: 16px;
  font-weight: 400;
  opacity: 0.7;
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s cubic-bezier(0.77, 0, 0.175, 1), transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta h2 { font-size: 42px; }
  .sb-cta .sb-lead { font-size: 16px; }
}
@media (max-width: 480px) {
  .sb-cta h2 { font-size: 32px; }
  .sb-cta .sb-cta-btn { padding: 16px 36px; font-size: 14px; }
}
</style>

<div class="sb-cta">
  <div class="sb-cta-inner">
    <div class="fade-up">
      <span class="sb-badge">Limited Time</span>
    </div>
    <h2 class="fade-up">Ready to 3x Your<br>Conversion Rate?</h2>
    <p class="sb-lead fade-up">Join 2,400+ marketers who stopped guessing and started converting. Your first page is live in under an hour.</p>
    <div class="fade-up">
      <a href="#" class="sb-cta-btn">Start Your Free Trial Now</a>
      <p class="sb-microcopy">No credit card required &bull; Cancel anytime &bull; 30-day guarantee</p>
    </div>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

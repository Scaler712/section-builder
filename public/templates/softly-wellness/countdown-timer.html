<!-- Generated: softly-wellness/countdown-timer -->
<style>
.sb-countdown-timer {
  background: #FDFCF8;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-countdown-timer .sb-blob-1 {
  position: absolute;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: var(--sb-accent);
  opacity: 0.08;
  filter: blur(80px);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  animation: sb-float 6s ease-in-out infinite;
}
.sb-countdown-timer .sb-blob-2 {
  position: absolute;
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: #EFEDF4;
  opacity: 0.35;
  filter: blur(80px);
  top: -10%;
  left: 10%;
  pointer-events: none;
  animation: sb-float 6s ease-in-out infinite 3s;
}
@keyframes sb-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}
.sb-countdown-timer-inner {
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-countdown-timer .sb-badge {
  display: inline-block;
  background: #FFF0F0;
  color: var(--sb-accent);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 28px;
  animation: sb-pulse-badge 2.5s ease-in-out infinite;
}
@keyframes sb-pulse-badge {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.sb-countdown-timer h2 {
  font-size: clamp(30px, 5vw, 44px);
  font-weight: 700;
  color: var(--sb-heading);
  letter-spacing: -0.025em;
  line-height: 1.15;
  margin: 0 0 12px 0;
}
.sb-countdown-timer .sb-sub {
  font-size: 17px;
  color: var(--sb-body);
  margin-bottom: 40px;
  line-height: 1.6;
}
.sb-countdown-boxes {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 40px;
}
.sb-countdown-box {
  background: #ffffff;
  border-radius: 2rem;
  box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
  padding: 24px 28px;
  min-width: 90px;
  transition: all 0.4s ease;
}
.sb-countdown-box:hover {
  box-shadow: 0 8px 32px -2px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}
.sb-countdown-box .sb-count-num {
  font-size: 40px;
  font-weight: 700;
  color: var(--sb-heading);
  line-height: 1;
  display: block;
}
.sb-countdown-box .sb-count-label {
  font-size: 12px;
  color: var(--sb-muted);
  margin-top: 8px;
  display: block;
}
.sb-countdown-timer .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 48px;
  font-family: var(--sb-font);
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 20px -2px rgba(0,0,0,0.12);
  transition: all 0.4s ease;
}
.sb-countdown-timer .sb-cta-btn:hover {
  box-shadow: 0 8px 32px -2px rgba(0,0,0,0.18);
  transform: translateY(-2px);
}
.sb-countdown-timer .sb-note {
  margin-top: 20px;
  font-size: 14px;
  color: var(--sb-muted);
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer h2 { font-size: 26px; }
  .sb-countdown-boxes { gap: 10px; }
  .sb-countdown-box { padding: 16px 18px; min-width: 68px; border-radius: 1.5rem; }
  .sb-countdown-box .sb-count-num { font-size: 30px; }
  .sb-countdown-timer .sb-cta-btn { width: 100%; text-align: center; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-blob-1"></div>
  <div class="sb-blob-2"></div>
  <div class="sb-countdown-timer-inner">
    <span class="sb-badge fade-up">Limited-time offer</span>
    <h2 class="fade-up">Spring enrollment closes soon</h2>
    <p class="sb-sub fade-up">Our next cohort begins together. Save 30% when you join before the doors close.</p>
    <div class="sb-countdown-boxes fade-up">
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-sw-days">03</span>
        <span class="sb-count-label">Days</span>
      </div>
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-sw-hours">11</span>
        <span class="sb-count-label">Hours</span>
      </div>
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-sw-mins">42</span>
        <span class="sb-count-label">Minutes</span>
      </div>
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-sw-secs">18</span>
        <span class="sb-count-label">Seconds</span>
      </div>
    </div>
    <a href="#" class="sb-cta-btn fade-up">Save my spot</a>
    <p class="sb-note fade-up">Only 48 spots remaining in this cohort</p>
  </div>
</div>

<script>
(function() {
  var deadline = new Date();
  deadline.setDate(deadline.getDate() + 3);
  deadline.setHours(deadline.getHours() + 11);

  function updateTimer() {
    var now = new Date().getTime();
    var distance = deadline.getTime() - now;
    if (distance < 0) { distance = 0; }

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var secs = Math.floor((distance % (1000 * 60)) / 1000);

    var daysEl = document.getElementById('sb-sw-days');
    var hoursEl = document.getElementById('sb-sw-hours');
    var minsEl = document.getElementById('sb-sw-mins');
    var secsEl = document.getElementById('sb-sw-secs');

    if (daysEl) daysEl.textContent = days < 10 ? '0' + days : days;
    if (hoursEl) hoursEl.textContent = hours < 10 ? '0' + hours : hours;
    if (minsEl) minsEl.textContent = mins < 10 ? '0' + mins : mins;
    if (secsEl) secsEl.textContent = secs < 10 ? '0' + secs : secs;
  }

  updateTimer();
  setInterval(updateTimer, 1000);

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

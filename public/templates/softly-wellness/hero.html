<!-- Generated: softly-wellness/hero -->
<style>
.sb-hero {
  background: #FDFCF8;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.sb-hero .sb-blob-1 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: var(--sb-accent);
  opacity: 0.08;
  filter: blur(80px);
  top: -10%;
  right: -5%;
  pointer-events: none;
  animation: sb-float 6s ease-in-out infinite;
}
.sb-hero .sb-blob-2 {
  position: absolute;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: #E8EFE8;
  opacity: 0.5;
  filter: blur(80px);
  bottom: -10%;
  left: -5%;
  pointer-events: none;
  animation: sb-float 6s ease-in-out infinite 2s;
}
.sb-hero .sb-blob-3 {
  position: absolute;
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: #EFEDF4;
  opacity: 0.4;
  filter: blur(80px);
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  animation: sb-float 6s ease-in-out infinite 4s;
}
@keyframes sb-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}
.sb-hero-inner {
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-hero .sb-badge {
  display: inline-block;
  background: rgba(255,183,178,0.15);
  color: var(--sb-accent);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 32px;
}
.sb-hero h1 {
  font-size: clamp(40px, 6vw, 72px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.025em;
  color: var(--sb-heading);
  margin: 0 0 24px 0;
}
.sb-hero h1 .sb-accent-word {
  color: var(--sb-accent);
}
.sb-hero .sb-sub {
  font-size: 18px;
  color: var(--sb-body);
  max-width: 520px;
  margin: 0 auto 40px;
  line-height: 1.7;
}
.sb-hero .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 44px;
  font-family: var(--sb-font);
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 20px -2px rgba(0,0,0,0.1);
  transition: all 0.4s ease;
}
.sb-hero .sb-cta-btn:hover {
  box-shadow: 0 8px 30px -2px rgba(0,0,0,0.15);
  transform: translateY(-2px);
}
.sb-hero .sb-trust {
  margin-top: 40px;
  color: var(--sb-muted);
  font-size: 14px;
}
.sb-hero .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.sb-hero .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-hero { min-height: 75vh; }
  .sb-hero h1 { font-size: 36px; }
  .sb-hero .sb-sub { font-size: 16px; margin-bottom: 32px; }
  .sb-hero .sb-blob-1, .sb-hero .sb-blob-2 { width: 200px; height: 200px; }
}
</style>

<div class="sb-hero">
  <div class="sb-blob-1"></div>
  <div class="sb-blob-2"></div>
  <div class="sb-blob-3"></div>
  <div class="sb-hero-inner">
    <span class="sb-badge fade-up">Your journey starts here</span>
    <h1 class="fade-up">Feel the difference<br>in <span class="sb-accent-word">every day</span></h1>
    <p class="sb-sub fade-up">A gentle, science-backed approach to wellness that fits into your real life. No extremes, no guilt -- just simple habits that actually stick.</p>
    <a href="#" class="sb-cta-btn fade-up">Begin your journey</a>
    <p class="sb-trust fade-up">Loved by 12,000+ women in 24 countries</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-hero .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

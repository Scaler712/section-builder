<!-- Generated: softly-wellness/cta -->
<style>
.sb-cta {
  background: #EFEDF4;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-cta .sb-blob-1 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: var(--sb-accent);
  opacity: 0.08;
  filter: blur(80px);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  animation: sb-float 6s ease-in-out infinite;
}
.sb-cta .sb-blob-2 {
  position: absolute;
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: #E8EFE8;
  opacity: 0.4;
  filter: blur(80px);
  top: -10%;
  right: 10%;
  pointer-events: none;
  animation: sb-float 6s ease-in-out infinite 3s;
}
@keyframes sb-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}
.sb-cta-inner {
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-badge {
  display: inline-block;
  background: rgba(255,183,178,0.15);
  color: var(--sb-accent);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 28px;
}
.sb-cta h2 {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 700;
  color: var(--sb-heading);
  letter-spacing: -0.025em;
  line-height: 1.15;
  margin: 0 0 20px 0;
}
.sb-cta h2 .sb-accent-word {
  color: var(--sb-accent);
}
.sb-cta .sb-lead {
  font-size: 18px;
  color: var(--sb-body);
  line-height: 1.7;
  margin: 0 0 40px 0;
  max-width: 540px;
  margin-left: auto;
  margin-right: auto;
}
.sb-cta .sb-btn-primary {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 48px;
  font-family: var(--sb-font);
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 20px -2px rgba(0,0,0,0.12);
  transition: all 0.4s ease;
}
.sb-cta .sb-btn-primary:hover {
  box-shadow: 0 8px 32px -2px rgba(0,0,0,0.18);
  transform: translateY(-2px);
}
.sb-cta .sb-proof {
  margin-top: 28px;
  font-size: 14px;
  color: var(--sb-muted);
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta h2 { font-size: 30px; }
  .sb-cta .sb-lead { font-size: 16px; }
  .sb-cta .sb-btn-primary { width: 100%; text-align: center; }
}
</style>

<div class="sb-cta">
  <div class="sb-blob-1"></div>
  <div class="sb-blob-2"></div>
  <div class="sb-cta-inner">
    <span class="sb-badge fade-up">Your next chapter starts now</span>
    <h2 class="fade-up">You deserve to feel<br><span class="sb-accent-word">whole again</span></h2>
    <p class="sb-lead fade-up">Join thousands of women who stopped waiting for the perfect moment and started choosing themselves. Your body will thank you.</p>
    <a href="#" class="sb-btn-primary fade-up">Begin your journey today</a>
    <p class="sb-proof fade-up">30-day satisfaction promise &middot; Cancel anytime &middot; Instant access</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

<!-- Generated: glassmorphic-depth/countdown-timer -->
<style>
.sb-countdown-timer {
  background: #000000;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-countdown-timer .sb-grain {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.15;
  mix-blend-mode: overlay;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}
.sb-countdown-timer .sb-watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22vw;
  font-weight: 700;
  color: #ffffff;
  opacity: 0.03;
  pointer-events: none;
  white-space: nowrap;
  letter-spacing: -0.05em;
  line-height: 1;
  font-family: var(--sb-font);
}
.sb-countdown-timer .sb-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(52,211,153,0.06), transparent 70%);
  filter: blur(60px);
  pointer-events: none;
}
.sb-countdown-timer-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-countdown-timer .sb-label {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--sb-accent);
  margin-bottom: 20px;
  animation: sb-gd-pulse 2s ease-in-out infinite;
}
@keyframes sb-gd-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.sb-countdown-timer h2 {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 600;
  line-height: 1.05;
  letter-spacing: -0.05em;
  color: var(--sb-heading);
  margin: 0 0 16px 0;
}
.sb-countdown-timer .sb-sub {
  font-size: 17px;
  color: rgba(244,244,245,0.45);
  max-width: 460px;
  margin: 0 auto 48px;
  line-height: 1.7;
}
.sb-countdown-timer .sb-timer-boxes {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 48px;
}
.sb-countdown-timer .sb-timer-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--sb-card-radius);
  padding: 24px 28px;
  min-width: 100px;
  transition: all 500ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-countdown-timer .sb-timer-box:hover {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.18);
}
.sb-countdown-timer .sb-timer-number {
  display: block;
  font-size: clamp(36px, 5vw, 52px);
  font-weight: 600;
  color: var(--sb-heading);
  letter-spacing: -0.05em;
  line-height: 1;
}
.sb-countdown-timer .sb-timer-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: rgba(244,244,245,0.35);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-top: 8px;
}
.sb-countdown-timer .sb-cta-pill {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--sb-btn-radius);
  padding: 6px 8px 6px 28px;
  text-decoration: none;
  cursor: pointer;
  transition: all 500ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-countdown-timer .sb-cta-pill:hover {
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.sb-countdown-timer .sb-cta-pill span {
  font-size: 15px;
  font-weight: 600;
  color: #ffffff;
  font-family: var(--sb-font);
}
.sb-countdown-timer .sb-cta-arrow {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--sb-accent);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 400ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-countdown-timer .sb-cta-pill:hover .sb-cta-arrow {
  transform: translateX(2px);
}
.sb-countdown-timer .sb-cta-arrow svg {
  width: 16px;
  height: 16px;
  stroke: #000000;
  fill: none;
  stroke-width: 2;
}
.sb-countdown-timer .sb-note {
  margin-top: 20px;
  font-size: 13px;
  color: rgba(244,244,245,0.3);
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 800ms cubic-bezier(0.16, 1, 0.3, 1), transform 800ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer h2 { font-size: 32px; }
  .sb-countdown-timer .sb-timer-boxes { flex-wrap: wrap; gap: 12px; }
  .sb-countdown-timer .sb-timer-box { min-width: 70px; padding: 18px 20px; flex: 1; }
  .sb-countdown-timer .sb-timer-number { font-size: 32px; }
  .sb-countdown-timer .sb-watermark { font-size: 30vw; }
  .sb-countdown-timer .sb-glow { width: 250px; height: 250px; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-grain"></div>
  <div class="sb-watermark">HURRY</div>
  <div class="sb-glow"></div>
  <div class="sb-countdown-timer-inner">
    <span class="sb-label fade-up">Time Sensitive</span>
    <h2 class="fade-up">This Price<br>Expires Soon</h2>
    <p class="sb-sub fade-up">Lock in the launch price before it increases by 40%. Limited to the first 100 members only.</p>
    <div class="sb-timer-boxes fade-up">
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-gd-cd-days">02</span>
        <span class="sb-timer-label">Days</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-gd-cd-hours">11</span>
        <span class="sb-timer-label">Hours</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-gd-cd-mins">47</span>
        <span class="sb-timer-label">Min</span>
      </div>
      <div class="sb-timer-box">
        <span class="sb-timer-number" id="sb-gd-cd-secs">33</span>
        <span class="sb-timer-label">Sec</span>
      </div>
    </div>
    <a href="#" class="sb-cta-pill fade-up">
      <span>Lock In My Price</span>
      <span class="sb-cta-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
    </a>
    <p class="sb-note fade-up">127 spots remaining at this price</p>
  </div>
</div>

<script>
(function() {
  var container = document.querySelector('.sb-countdown-timer');
  var deadline = container.getAttribute('data-deadline');
  var target = deadline ? new Date(deadline).getTime() : Date.now() + 3 * 24 * 60 * 60 * 1000;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function tick() {
    var now = Date.now();
    var diff = Math.max(0, target - now);
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    var elD = document.getElementById('sb-gd-cd-days');
    var elH = document.getElementById('sb-gd-cd-hours');
    var elM = document.getElementById('sb-gd-cd-mins');
    var elS = document.getElementById('sb-gd-cd-secs');
    if (elD) elD.textContent = pad(d);
    if (elH) elH.textContent = pad(h);
    if (elM) elM.textContent = pad(m);
    if (elS) elS.textContent = pad(s);
  }

  tick();
  setInterval(tick, 1000);

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

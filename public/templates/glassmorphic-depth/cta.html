<!-- Generated: glassmorphic-depth/cta -->
<style>
.sb-cta {
  background: #000000;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-cta .sb-grain {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.15;
  mix-blend-mode: overlay;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}
.sb-cta .sb-watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22vw;
  font-weight: 700;
  color: #ffffff;
  opacity: 0.03;
  pointer-events: none;
  white-space: nowrap;
  letter-spacing: -0.05em;
  line-height: 1;
  font-family: var(--sb-font);
}
.sb-cta .sb-glow-orb {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(52,211,153,0.08), rgba(52,211,153,0.03) 40%, transparent 70%);
  filter: blur(60px);
  pointer-events: none;
}
.sb-cta-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-label {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--sb-accent);
  margin-bottom: 24px;
}
.sb-cta h2 {
  font-size: clamp(40px, 7vw, 80px);
  font-weight: 600;
  line-height: 1.02;
  letter-spacing: -0.05em;
  color: var(--sb-heading);
  margin: 0 0 24px 0;
}
.sb-cta h2 em {
  font-style: normal;
  color: var(--sb-accent);
}
.sb-cta .sb-sub {
  font-size: 18px;
  color: rgba(244,244,245,0.45);
  max-width: 480px;
  margin: 0 auto 44px;
  line-height: 1.7;
}
.sb-cta .sb-cta-pill {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--sb-btn-radius);
  padding: 6px 8px 6px 28px;
  text-decoration: none;
  cursor: pointer;
  transition: all 500ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-cta .sb-cta-pill:hover {
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.sb-cta .sb-cta-pill span {
  font-size: 15px;
  font-weight: 600;
  color: #ffffff;
  font-family: var(--sb-font);
}
.sb-cta .sb-cta-arrow {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--sb-accent);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 400ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-cta .sb-cta-pill:hover .sb-cta-arrow {
  transform: translateX(2px);
}
.sb-cta .sb-cta-arrow svg {
  width: 16px;
  height: 16px;
  stroke: #000000;
  fill: none;
  stroke-width: 2;
}
.sb-cta .sb-proof {
  margin-top: 28px;
  font-size: 13px;
  color: rgba(244,244,245,0.3);
}
.sb-cta .sb-proof strong {
  color: rgba(244,244,245,0.5);
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 800ms cubic-bezier(0.16, 1, 0.3, 1), transform 800ms cubic-bezier(0.16, 1, 0.3, 1);
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta h2 { font-size: 36px; }
  .sb-cta .sb-sub { font-size: 16px; margin-bottom: 36px; }
  .sb-cta .sb-glow-orb { width: 300px; height: 300px; }
  .sb-cta .sb-watermark { font-size: 30vw; }
}
</style>

<div class="sb-cta">
  <div class="sb-grain"></div>
  <div class="sb-watermark">GO</div>
  <div class="sb-glow-orb"></div>
  <div class="sb-cta-inner">
    <span class="sb-label fade-up">Limited Enrollment</span>
    <h2 class="fade-up">Stop Planning.<br>Start <em>Building.</em></h2>
    <p class="sb-sub fade-up">Spots fill fast and we cap enrollment to maintain community quality. The next cohort starts Monday.</p>
    <a href="#" class="sb-cta-pill fade-up">
      <span>Claim Your Spot Now</span>
      <span class="sb-cta-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
    </a>
    <p class="sb-proof fade-up"><strong>30-day guarantee</strong> &mdash; 3,200+ members &mdash; Cancel anytime</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

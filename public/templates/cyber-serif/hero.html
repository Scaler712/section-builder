<!-- Generated: cyber-serif/hero -->
<style>
.sb-hero {
  background: #050505;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
}
.sb-hero .sb-ambient-line {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 100%;
  background: linear-gradient(180deg, transparent 0%, var(--sb-accent) 50%, transparent 100%);
  opacity: 0.15;
  pointer-events: none;
}
.sb-hero-inner {
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  text-align: center;
  width: 100%;
}
.sb-hero .sb-badge {
  display: inline-block;
  font-family: monospace;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--sb-accent);
  margin-bottom: 32px;
  padding: 8px 20px;
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 50px;
  background: rgba(16,185,129,0.05);
}
.sb-hero h1 {
  font-size: clamp(48px, 8vw, 100px);
  font-weight: 200;
  font-style: italic;
  color: var(--sb-heading);
  letter-spacing: -0.04em;
  line-height: 1.05;
  margin: 0 0 28px 0;
}
.sb-hero h1 .sb-gradient {
  background: linear-gradient(135deg, var(--sb-accent), #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 400;
}
.sb-hero .sb-subtitle {
  font-size: 18px;
  color: var(--sb-body);
  font-weight: 400;
  margin: 0 auto 48px auto;
  max-width: 560px;
  line-height: 1.7;
  font-family: 'Inter', sans-serif;
}
.sb-hero .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #050505;
  border-radius: var(--sb-btn-radius);
  padding: 18px 52px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.02em;
  border: none;
}
.sb-hero .sb-cta-btn:hover {
  box-shadow: 0 0 40px rgba(16,185,129,0.25);
  transform: translateY(-2px);
}
.sb-hero .sb-microcopy {
  font-family: monospace;
  font-size: 11px;
  color: var(--sb-muted);
  margin-top: 16px;
  letter-spacing: 0.05em;
}
.sb-hero .sb-social-proof {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  margin-top: 56px;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 16px 28px;
}
.sb-hero .sb-avatars {
  display: flex;
}
.sb-hero .sb-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid #050505;
  background: rgba(16,185,129,0.15);
  margin-left: -10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--sb-accent);
}
.sb-hero .sb-avatar:first-child {
  margin-left: 0;
}
.sb-hero .sb-proof-text {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--sb-body);
  font-weight: 500;
}
.sb-hero .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.sb-hero .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-hero { min-height: 80vh; }
  .sb-hero h1 { font-size: 44px; }
  .sb-hero .sb-subtitle { font-size: 16px; }
}
@media (max-width: 480px) {
  .sb-hero h1 { font-size: 36px; }
  .sb-hero .sb-cta-btn { padding: 16px 36px; font-size: 13px; }
  .sb-hero .sb-social-proof { flex-direction: column; gap: 10px; }
}
</style>

<div class="sb-hero">
  <div class="sb-ambient-line"></div>
  <div class="sb-hero-inner">
    <div class="fade-up">
      <span class="sb-badge">Now Available</span>
    </div>
    <h1 class="fade-up">The Future of<br><span class="sb-gradient">Intelligent Design</span></h1>
    <p class="sb-subtitle fade-up">Precision-engineered tools that transform how you create, collaborate, and ship. Built for teams that refuse to compromise.</p>
    <div class="fade-up">
      <a href="#" class="sb-cta-btn">Request Early Access</a>
      <p class="sb-microcopy">No credit card required &bull; 14-day trial</p>
    </div>
    <div class="fade-up" style="text-align:center;">
      <div class="sb-social-proof">
        <div class="sb-avatars">
          <div class="sb-avatar">A</div>
          <div class="sb-avatar">R</div>
          <div class="sb-avatar">K</div>
          <div class="sb-avatar">M</div>
        </div>
        <span class="sb-proof-text">2,400+ teams onboarded</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-hero .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

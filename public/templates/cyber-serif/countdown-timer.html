<!-- Generated: cyber-serif/countdown-timer -->
<style>
.sb-countdown-timer {
  background: #050505;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-countdown-timer .sb-glow {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: var(--sb-accent);
  opacity: 0.03;
  filter: blur(140px);
  pointer-events: none;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}
.sb-countdown-timer-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
}
.sb-countdown-timer .sb-badge {
  display: inline-block;
  font-family: monospace;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--sb-accent);
  margin-bottom: 20px;
  padding: 8px 20px;
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 50px;
  background: rgba(16,185,129,0.05);
}
.sb-countdown-timer h2 {
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 200;
  font-style: italic;
  color: var(--sb-heading);
  letter-spacing: -0.04em;
  line-height: 1.1;
  margin: 0 0 12px 0;
}
.sb-countdown-timer .sb-sub {
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  color: var(--sb-muted);
  margin: 0 0 40px 0;
}
.sb-timer-boxes {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 44px;
}
.sb-timer-box {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 24px 20px;
  min-width: 90px;
  text-align: center;
}
.sb-timer-box .sb-num {
  font-size: 40px;
  font-weight: 200;
  font-style: italic;
  color: var(--sb-heading);
  letter-spacing: -0.03em;
  line-height: 1;
}
.sb-timer-box .sb-unit {
  font-family: monospace;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--sb-muted);
  margin-top: 8px;
}
.sb-countdown-timer .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #050505;
  border-radius: var(--sb-btn-radius);
  padding: 18px 52px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.02em;
  border: none;
}
.sb-countdown-timer .sb-cta-btn:hover {
  box-shadow: 0 0 40px rgba(16,185,129,0.25);
  transform: translateY(-2px);
}
.sb-countdown-timer .sb-microcopy {
  font-family: monospace;
  font-size: 11px;
  color: var(--sb-muted);
  margin-top: 16px;
  letter-spacing: 0.05em;
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer h2 { font-size: 32px; }
  .sb-timer-boxes { gap: 10px; }
  .sb-timer-box { min-width: 70px; padding: 18px 14px; border-radius: 18px; }
  .sb-timer-box .sb-num { font-size: 30px; }
}
@media (max-width: 480px) {
  .sb-timer-box { min-width: 60px; padding: 14px 10px; }
  .sb-timer-box .sb-num { font-size: 26px; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-glow"></div>
  <div class="sb-countdown-timer-inner">
    <span class="sb-badge fade-up">Offer Expires Soon</span>
    <h2 class="fade-up">Early Access Closes In</h2>
    <p class="sb-sub fade-up">Lock in founding member pricing before it's gone forever.</p>
    <div class="sb-timer-boxes fade-up">
      <div class="sb-timer-box">
        <div class="sb-num" id="sb-days">02</div>
        <div class="sb-unit">Days</div>
      </div>
      <div class="sb-timer-box">
        <div class="sb-num" id="sb-hours">14</div>
        <div class="sb-unit">Hours</div>
      </div>
      <div class="sb-timer-box">
        <div class="sb-num" id="sb-minutes">37</div>
        <div class="sb-unit">Minutes</div>
      </div>
      <div class="sb-timer-box">
        <div class="sb-num" id="sb-seconds">51</div>
        <div class="sb-unit">Seconds</div>
      </div>
    </div>
    <div class="fade-up">
      <a href="#" class="sb-cta-btn">Get Early Access</a>
      <p class="sb-microcopy">Founding member rate &bull; Locked in forever</p>
    </div>
  </div>
</div>

<script>
(function() {
  var deadline = new Date();
  deadline.setDate(deadline.getDate() + 2);
  deadline.setHours(deadline.getHours() + 14);
  deadline.setMinutes(deadline.getMinutes() + 37);

  function updateTimer() {
    var now = new Date().getTime();
    var distance = deadline.getTime() - now;
    if (distance < 0) distance = 0;

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    var daysEl = document.getElementById('sb-days');
    var hoursEl = document.getElementById('sb-hours');
    var minutesEl = document.getElementById('sb-minutes');
    var secondsEl = document.getElementById('sb-seconds');

    if (daysEl) daysEl.textContent = days < 10 ? '0' + days : days;
    if (hoursEl) hoursEl.textContent = hours < 10 ? '0' + hours : hours;
    if (minutesEl) minutesEl.textContent = minutes < 10 ? '0' + minutes : minutes;
    if (secondsEl) secondsEl.textContent = seconds < 10 ? '0' + seconds : seconds;
  }

  updateTimer();
  setInterval(updateTimer, 1000);

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

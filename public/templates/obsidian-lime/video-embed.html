<!-- Generated: obsidian-lime/video-embed -->
<style>
.sb-video-embed {
  background: #0c0c0c;
  padding: var(--sb-section-pad, 100px 20px);
  font-family: 'Space Grotesk', var(--sb-font), sans-serif;
  color: var(--sb-body);
  position: relative;
  overflow: hidden;
}
.sb-video-embed::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.sb-video-embed-inner {
  max-width: 900px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}
.sb-video-embed-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sb-accent);
  margin-bottom: 16px;
  text-align: center;
}
.sb-video-embed-title {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.06em;
  line-height: 1.05;
  color: var(--sb-heading);
  margin: 0 0 16px;
  text-align: center;
}
.sb-video-embed-sub {
  font-size: 16px;
  color: rgba(235,235,235,0.5);
  text-align: center;
  margin: 0 0 48px;
  line-height: 1.7;
}
.sb-video-embed-frame {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2rem;
  overflow: hidden;
  padding: 8px;
}
.sb-video-embed-ratio {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  background: #000000;
  border-radius: 1.5rem;
  overflow: hidden;
}
.sb-video-embed-ratio iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.sb-video-embed-placeholder {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.sb-video-embed-play {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--sb-accent);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: box-shadow 400ms ease, transform 300ms ease;
}
.sb-video-embed-play:hover {
  box-shadow: 0 0 40px rgba(204,255,0,0.3);
  transform: scale(1.08);
}
.sb-video-embed-play-icon {
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 12px 0 12px 22px;
  border-color: transparent transparent transparent #0c0c0c;
  margin-left: 4px;
}
.sb-video-embed-play-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(235,235,235,0.4);
}
.sb-video-embed .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 700ms cubic-bezier(0.77, 0, 0.175, 1), transform 700ms cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-video-embed .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}
@media (max-width: 768px) {
  .sb-video-embed-title { font-size: 32px; }
  .sb-video-embed-frame { border-radius: 1.25rem; padding: 6px; }
  .sb-video-embed-ratio { border-radius: 1rem; }
}
@media (max-width: 480px) {
  .sb-video-embed-title { font-size: 26px; }
  .sb-video-embed-play { width: 56px; height: 56px; }
  .sb-video-embed-play-icon { border-width: 10px 0 10px 18px; }
}
</style>

<div class="sb-video-embed">
  <div class="sb-video-embed-inner">
    <div class="sb-video-embed-label fade-up">See it in action</div>
    <h2 class="sb-video-embed-title fade-up">From git push to production in 8 seconds.</h2>
    <p class="sb-video-embed-sub fade-up">Watch a full deploy, rollback, and traffic scaling demo in under 3 minutes.</p>
    <div class="sb-video-embed-frame fade-up">
      <div class="sb-video-embed-ratio">
        <div class="sb-video-embed-placeholder">
          <div class="sb-video-embed-play">
            <div class="sb-video-embed-play-icon"></div>
          </div>
          <span class="sb-video-embed-play-label">Watch demo &bull; 2:47</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-video-embed .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

<!-- Generated: obsidian-lime/cta -->
<style>
.sb-cta {
  background: #0c0c0c;
  padding: var(--sb-section-pad, 100px 20px);
  font-family: 'Space Grotesk', var(--sb-font), sans-serif;
  color: var(--sb-body);
  position: relative;
  overflow: hidden;
}
.sb-cta::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.sb-cta-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(204,255,0,0.06), transparent 70%);
  filter: blur(80px);
  pointer-events: none;
  z-index: 1;
}
.sb-cta-inner {
  max-width: 760px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  text-align: center;
}
.sb-cta-shell {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2.5rem;
  padding: 80px 56px;
}
.sb-cta-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sb-accent);
  margin-bottom: 24px;
}
.sb-cta-headline {
  font-size: 44px;
  font-weight: 700;
  letter-spacing: -0.06em;
  line-height: 1.05;
  color: var(--sb-heading);
  margin: 0 0 20px;
}
.sb-cta-sub {
  font-size: 16px;
  font-weight: 400;
  color: rgba(235,235,235,0.5);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto 40px;
}
.sb-cta-btn {
  display: inline-block;
  padding: 18px 52px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Space Grotesk', var(--sb-font), sans-serif;
  letter-spacing: -0.02em;
  color: #0c0c0c;
  background: var(--sb-cta-bg);
  border: none;
  border-radius: var(--sb-btn-radius, 50px);
  text-decoration: none;
  cursor: pointer;
  transition: all 400ms cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-cta-btn:hover {
  background: #d9ff4d;
  box-shadow: 0 0 60px rgba(204,255,0,0.25);
}
.sb-cta-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: rgba(235,235,235,0.3);
  margin-top: 20px;
  letter-spacing: 0.02em;
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 700ms cubic-bezier(0.77, 0, 0.175, 1), transform 700ms cubic-bezier(0.77, 0, 0.175, 1);
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}
@media (max-width: 768px) {
  .sb-cta-headline { font-size: 36px; }
  .sb-cta-shell { padding: 56px 32px; border-radius: 1.5rem; }
}
@media (max-width: 480px) {
  .sb-cta-headline { font-size: 28px; }
  .sb-cta-shell { padding: 40px 20px; border-radius: 1.25rem; }
  .sb-cta-btn { padding: 16px 40px; font-size: 14px; }
}
</style>

<div class="sb-cta">
  <div class="sb-cta-glow"></div>
  <div class="sb-cta-inner">
    <div class="sb-cta-shell fade-up">
      <div class="sb-cta-label">Ready to ship?</div>
      <h2 class="sb-cta-headline">Your first deploy is 90 seconds away.</h2>
      <p class="sb-cta-sub">Join 12,000+ teams who stopped fighting infrastructure and started building product. Free tier, no credit card.</p>
      <a href="#" class="sb-cta-btn">Start building free</a>
      <div class="sb-cta-note">No credit card &bull; Free forever tier &bull; Cancel anytime</div>
    </div>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

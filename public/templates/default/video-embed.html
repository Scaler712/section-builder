<!-- Generated: default/video-embed -->
<style>
.sb-video-embed {
  background: #ffffff;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
}
.sb-video-embed-inner {
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
}
.sb-video-embed .sb-badge {
  display: inline-block;
  background: var(--sb-highlight);
  color: var(--sb-accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}
.sb-video-embed .sb-section-title {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--sb-heading);
  margin: 0 0 12px 0;
}
.sb-video-embed .sb-section-sub {
  font-size: 17px;
  color: var(--sb-muted);
  max-width: 560px;
  margin: 0 auto 40px;
  line-height: 1.6;
}
.sb-video-embed .sb-video-wrapper {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  border-radius: var(--sb-card-radius);
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.1);
}
.sb-video-embed .sb-video-ratio {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}
.sb-video-embed .sb-video-ratio iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.sb-video-embed .sb-video-caption {
  margin-top: 20px;
  font-size: 14px;
  color: var(--sb-muted);
  font-style: italic;
}
.sb-video-embed .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-video-embed .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-video-embed .sb-section-title { font-size: 28px; }
  .sb-video-embed .sb-section-sub { font-size: 15px; }
}
</style>

<div class="sb-video-embed">
  <div class="sb-video-embed-inner">
    <span class="sb-badge fade-up">Watch This First</span>
    <h2 class="sb-section-title fade-up">See Exactly How the System Works</h2>
    <p class="sb-section-sub fade-up">In under 8 minutes, you'll see the exact framework that helped 2,400+ founders go from idea to revenue.</p>
    <div class="sb-video-wrapper fade-up">
      <div class="sb-video-ratio">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="System walkthrough" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
    <p class="sb-video-caption fade-up">No opt-in required. Watch the full breakdown for free.</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-video-embed .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

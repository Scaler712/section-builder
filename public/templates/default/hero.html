<!-- Generated: default/hero -->
<style>
.sb-hero {
  background: #ffffff;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  min-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sb-hero-inner {
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
}
.sb-hero .sb-badge {
  display: inline-block;
  background: var(--sb-highlight);
  color: var(--sb-accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 28px;
}
.sb-hero h1 {
  font-size: clamp(40px, 6vw, 72px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--sb-heading);
  margin: 0 0 24px 0;
}
.sb-hero h1 .sb-accent-word {
  color: var(--sb-accent);
}
.sb-hero .sb-sub {
  font-size: 18px;
  color: var(--sb-body);
  max-width: 560px;
  margin: 0 auto 40px;
  line-height: 1.7;
}
.sb-hero .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: var(--sb-cta-text, #ffffff);
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 16px 40px;
  font-family: var(--sb-font);
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.3s ease;
}
.sb-hero .sb-cta-btn:hover {
  opacity: 0.88;
}
.sb-hero .sb-trust {
  margin-top: 40px;
  color: var(--sb-muted);
  font-size: 14px;
}
.sb-hero .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-hero .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-hero { min-height: 70vh; }
  .sb-hero h1 { font-size: 36px; }
  .sb-hero .sb-sub { font-size: 16px; margin-bottom: 32px; }
}
</style>

<div class="sb-hero">
  <div class="sb-hero-inner">
    <span class="sb-badge fade-up">Limited Spots Available</span>
    <h1 class="fade-up">Launch Your Business<br>in <span class="sb-accent-word">30 Days</span></h1>
    <p class="sb-sub fade-up">The proven system that took 2,400+ entrepreneurs from idea to revenue. No guesswork, no fluff — just a clear path to your first paying customers.</p>
    <a href="#" class="sb-cta-btn fade-up">Get Instant Access</a>
    <p class="sb-trust fade-up">Trusted by 2,400+ founders across 38 countries</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-hero .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

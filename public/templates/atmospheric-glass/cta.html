<!-- Generated: atmospheric-glass/cta -->
<style>
.sb-cta {
  background: #0f172a;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-cta .sb-glow-1 {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.2), rgba(168,85,247,0.12), transparent 70%);
  filter: blur(80px);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.sb-cta .sb-glow-2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(236,72,153,0.1), transparent 70%);
  filter: blur(60px);
  top: -10%;
  right: 10%;
  pointer-events: none;
}
.sb-cta .sb-glow-3 {
  position: absolute;
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.12), transparent 70%);
  filter: blur(60px);
  bottom: -10%;
  left: 15%;
  pointer-events: none;
}
.sb-cta-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-cta .sb-badge {
  display: inline-block;
  background: rgba(99,102,241,0.15);
  color: var(--sb-accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(99,102,241,0.3);
  margin-bottom: 32px;
  font-family: 'Inter', sans-serif;
}
.sb-cta h2 {
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 20px 0;
}
.sb-cta h2 .sb-accent-word {
  background: linear-gradient(135deg, #6366f1, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sb-cta .sb-lead {
  font-size: 18px;
  color: rgba(255,255,255,0.55);
  line-height: 1.7;
  margin: 0 0 44px 0;
  font-family: 'Inter', sans-serif;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}
.sb-cta .sb-btn-primary {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 48px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(99,102,241,0.35);
  transition: all 500ms ease;
}
.sb-cta .sb-btn-primary:hover {
  box-shadow: 0 8px 36px rgba(99,102,241,0.5);
  transform: translateY(-2px);
}
.sb-cta .sb-proof {
  margin-top: 36px;
  font-size: 14px;
  color: rgba(255,255,255,0.35);
  font-family: 'Inter', sans-serif;
}
.sb-cta .sb-proof strong {
  color: rgba(255,255,255,0.65);
}
.sb-cta .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-cta .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-cta h2 { font-size: 32px; }
  .sb-cta .sb-lead { font-size: 16px; }
  .sb-cta .sb-btn-primary { width: 100%; text-align: center; }
}
</style>

<div class="sb-cta">
  <div class="sb-glow-1"></div>
  <div class="sb-glow-2"></div>
  <div class="sb-glow-3"></div>
  <div class="sb-cta-inner">
    <span class="sb-badge fade-up">Limited Early Access</span>
    <h2 class="fade-up">Ready to Build<br><span class="sb-accent-word">Something Great?</span></h2>
    <p class="sb-lead fade-up">Join 2,400+ founders who stopped guessing and started growing. Your first campaign could be live in the next 30 minutes.</p>
    <a href="#" class="sb-btn-primary fade-up">Start Your Free Trial</a>
    <p class="sb-proof fade-up"><strong>No credit card required</strong> &middot; 14-day free trial &middot; Cancel anytime</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-cta .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

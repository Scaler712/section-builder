<!-- Generated: atmospheric-glass/hero -->
<style>
.sb-hero {
  background: #0f172a;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.sb-hero .sb-glow-1 {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.2), rgba(168,85,247,0.12), transparent 70%);
  filter: blur(80px);
  top: -10%;
  right: -5%;
  pointer-events: none;
}
.sb-hero .sb-glow-2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,85,247,0.15), rgba(99,102,241,0.08), transparent 70%);
  filter: blur(60px);
  bottom: -15%;
  left: -5%;
  pointer-events: none;
}
.sb-hero .sb-glow-3 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(236,72,153,0.1), transparent 70%);
  filter: blur(60px);
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}
.sb-hero-inner {
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-hero .sb-badge {
  display: inline-block;
  background: rgba(99,102,241,0.1);
  color: var(--sb-accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  border: 1px solid rgba(99,102,241,0.2);
  margin-bottom: 32px;
  font-family: 'Inter', sans-serif;
}
.sb-hero h1 {
  font-size: clamp(42px, 6vw, 76px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: #ffffff;
  margin: 0 0 24px 0;
}
.sb-hero h1 .sb-accent-word {
  background: linear-gradient(135deg, #6366f1, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sb-hero .sb-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  max-width: 560px;
  margin: 0 auto 44px;
  line-height: 1.7;
  font-family: 'Inter', sans-serif;
}
.sb-hero .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 16px 44px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(99,102,241,0.3);
  transition: all 500ms ease;
}
.sb-hero .sb-cta-btn:hover {
  box-shadow: 0 8px 30px rgba(99,102,241,0.45);
  transform: translateY(-2px);
}
.sb-hero .sb-trust {
  margin-top: 44px;
  color: rgba(255,255,255,0.35);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
}
.sb-hero .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-hero .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-hero { min-height: 75vh; }
  .sb-hero h1 { font-size: 36px; }
  .sb-hero .sb-sub { font-size: 16px; margin-bottom: 32px; }
  .sb-hero .sb-glow-1, .sb-hero .sb-glow-2 { width: 250px; height: 250px; }
}
</style>

<div class="sb-hero">
  <div class="sb-glow-1"></div>
  <div class="sb-glow-2"></div>
  <div class="sb-glow-3"></div>
  <div class="sb-hero-inner">
    <span class="sb-badge fade-up">Now Accepting Early Access</span>
    <h1 class="fade-up">The Future of Growth<br>Is <span class="sb-accent-word">Intelligent</span></h1>
    <p class="sb-sub fade-up">AI-powered infrastructure that scaled 2,400+ businesses from zero to revenue. One platform, one decision, exponential results.</p>
    <a href="#" class="sb-cta-btn fade-up">Start Your Free Trial</a>
    <p class="sb-trust fade-up">Trusted by teams at 200+ high-growth companies worldwide</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-hero .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

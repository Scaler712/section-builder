<!-- Generated: atmospheric-glass/video-embed -->
<style>
.sb-video-embed {
  background: #0f172a;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-video-embed .sb-glow-1 {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.15), rgba(168,85,247,0.1), transparent 70%);
  filter: blur(80px);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.sb-video-embed .sb-glow-2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(236,72,153,0.08), transparent 70%);
  filter: blur(60px);

  right: 5%;
  pointer-events: none;
}
.sb-video-embed-inner {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-video-embed .sb-badge {
  display: inline-block;
  background: rgba(99,102,241,0.1);
  color: var(--sb-accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(99,102,241,0.2);
  margin-bottom: 24px;
  font-family: 'Inter', sans-serif;
}
.sb-video-embed h2 {
  font-size: 40px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 0 0 12px 0;
}
.sb-video-embed .sb-subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 44px;
  font-family: 'Inter', sans-serif;
}
.sb-video-wrapper {
  position: relative;
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--sb-card-radius);
  overflow: hidden;
  padding: 8px;
}
.sb-video-wrapper .sb-video-inner {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius: 14px;
}
.sb-video-wrapper .sb-video-inner iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.sb-video-wrapper .sb-video-placeholder {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.sb-video-wrapper .sb-play-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(99,102,241,0.3);
  border: 2px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: #ffffff;
  cursor: pointer;
  transition: all 500ms ease;
}
.sb-video-wrapper .sb-play-btn:hover {
  background: rgba(99,102,241,0.5);
  transform: scale(1.08);
}
.sb-video-wrapper .sb-play-label {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  font-family: 'Inter', sans-serif;
}
.sb-video-embed .sb-caption {
  margin-top: 20px;
  font-size: 14px;
  color: rgba(255,255,255,0.35);
  font-family: 'Inter', sans-serif;
}
.sb-video-embed .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-video-embed .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-video-embed h2 { font-size: 28px; }
  .sb-video-wrapper { padding: 4px; }
}
</style>

<div class="sb-video-embed">
  <div class="sb-glow-1"></div>
  <div class="sb-glow-2"></div>
  <div class="sb-video-embed-inner">
    <span class="sb-badge fade-up">See It In Action</span>
    <h2 class="fade-up">Watch the 3-Minute Demo</h2>
    <p class="sb-subtitle fade-up">See exactly how teams launch high-converting campaigns in under an hour.</p>
    <div class="sb-video-wrapper fade-up">
      <div class="sb-video-inner">
        <div class="sb-video-placeholder">
          <div class="sb-play-btn">&#9654;</div>
          <span class="sb-play-label">Click to play (3:24)</span>
        </div>
        <!-- Replace with actual embed:
        <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
        -->
      </div>
    </div>
    <p class="sb-caption fade-up">No signup required to watch. See the full product walkthrough.</p>
  </div>
</div>

<script>
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-video-embed .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>

<!-- Generated: atmospheric-glass/countdown-timer -->
<style>
.sb-countdown-timer {
  background: #0f172a;
  padding: var(--sb-section-pad);
  font-family: var(--sb-font);
  position: relative;
  overflow: hidden;
}
.sb-countdown-timer .sb-glow-1 {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.18), rgba(168,85,247,0.1), transparent 70%);
  filter: blur(80px);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.sb-countdown-timer .sb-glow-2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(236,72,153,0.08), transparent 70%);
  filter: blur(60px);
  top: -10%;
  left: 10%;
  pointer-events: none;
}
.sb-countdown-timer-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}
.sb-countdown-timer .sb-badge {
  display: inline-block;
  background: rgba(239,68,68,0.15);
  color: #f87171;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(239,68,68,0.25);
  margin-bottom: 28px;
  font-family: 'Inter', sans-serif;
  animation: sb-pulse-badge 2s ease-in-out infinite;
}
@keyframes sb-pulse-badge {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.sb-countdown-timer h2 {
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 0 0 16px 0;
}
.sb-countdown-timer .sb-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 44px;
  font-family: 'Inter', sans-serif;
}
.sb-countdown-boxes {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 44px;
}
.sb-countdown-box {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--sb-card-radius);
  padding: 24px 28px;
  min-width: 100px;
  transition: all 500ms ease;
}
.sb-countdown-box:hover {
  border-color: rgba(99,102,241,0.3);
}
.sb-countdown-box .sb-count-num {
  font-size: 44px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1;
  display: block;
}
.sb-countdown-box .sb-count-label {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 8px;
  display: block;
  font-family: 'Inter', sans-serif;
}
.sb-countdown-timer .sb-cta-btn {
  display: inline-block;
  background: var(--sb-cta-bg);
  color: #ffffff;
  border: none;
  border-radius: var(--sb-btn-radius);
  padding: 18px 48px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(99,102,241,0.35);
  transition: all 500ms ease;
}
.sb-countdown-timer .sb-cta-btn:hover {
  box-shadow: 0 8px 36px rgba(99,102,241,0.5);
  transform: translateY(-2px);
}
.sb-countdown-timer .sb-note {
  margin-top: 20px;
  font-size: 14px;
  color: rgba(255,255,255,0.3);
  font-family: 'Inter', sans-serif;
}
.sb-countdown-timer .fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.sb-countdown-timer .fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 768px) {
  .sb-countdown-timer h2 { font-size: 28px; }
  .sb-countdown-boxes { gap: 12px; }
  .sb-countdown-box { padding: 16px 18px; min-width: 72px; }
  .sb-countdown-box .sb-count-num { font-size: 32px; }
  .sb-countdown-timer .sb-cta-btn { width: 100%; text-align: center; }
}
</style>

<div class="sb-countdown-timer">
  <div class="sb-glow-1"></div>
  <div class="sb-glow-2"></div>
  <div class="sb-countdown-timer-inner">
    <span class="sb-badge fade-up">Offer Expires Soon</span>
    <h2 class="fade-up">Early Access Pricing<br>Ends In</h2>
    <p class="sb-sub fade-up">Lock in 40% off before the timer hits zero. This price won't come back.</p>
    <div class="sb-countdown-boxes fade-up">
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-days">02</span>
        <span class="sb-count-label">Days</span>
      </div>
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-hours">14</span>
        <span class="sb-count-label">Hours</span>
      </div>
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-mins">37</span>
        <span class="sb-count-label">Minutes</span>
      </div>
      <div class="sb-countdown-box">
        <span class="sb-count-num" id="sb-secs">52</span>
        <span class="sb-count-label">Seconds</span>
      </div>
    </div>
    <a href="#" class="sb-cta-btn fade-up">Claim Your Discount</a>
    <p class="sb-note fade-up">127 spots remaining at this price</p>
  </div>
</div>

<script>
(function() {
  var deadline = new Date();
  deadline.setDate(deadline.getDate() + 2);
  deadline.setHours(deadline.getHours() + 14);

  function updateTimer() {
    var now = new Date().getTime();
    var distance = deadline.getTime() - now;
    if (distance < 0) { distance = 0; }

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var secs = Math.floor((distance % (1000 * 60)) / 1000);

    var daysEl = document.getElementById('sb-days');
    var hoursEl = document.getElementById('sb-hours');
    var minsEl = document.getElementById('sb-mins');
    var secsEl = document.getElementById('sb-secs');

    if (daysEl) daysEl.textContent = days < 10 ? '0' + days : days;
    if (hoursEl) hoursEl.textContent = hours < 10 ? '0' + hours : hours;
    if (minsEl) minsEl.textContent = mins < 10 ? '0' + mins : mins;
    if (secsEl) secsEl.textContent = secs < 10 ? '0' + secs : secs;
  }

  updateTimer();
  setInterval(updateTimer, 1000);

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  var elements = document.querySelectorAll('.sb-countdown-timer .fade-up');
  for (var i = 0; i < elements.length; i++) {
    observer.observe(elements[i]);
  }
})();
</script>
